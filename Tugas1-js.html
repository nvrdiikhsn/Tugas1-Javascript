<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas 1</title>
</head>
<body>
    <h2>Perhitungan Luas Bangun Datar</h2>
    <h3>Persegi Panjang</h3>
    <script>
        // Hitung luas persegi panjang
        let panjang = 10;
        let lebar = 5;

        // Rumus Luas Persegi Panjang
        let luasPersegiPanjang = panjang * lebar;

        // Cetak Hasil
        document.write(
            "Panjang: " + panjang + "cm " +
            "<br>Lebar: " + lebar + "cm " +
            "<br>Luas Persegi Panjang: " + luasPersegiPanjang + "cm² "
        );
        document.write("<br><br><hr>");
        
        document.write("<h3>Bujur Sangkar</h3>");

        // Hitung Luas Bujur Sangkar
        let sisi = 10;

        // Rumus Luas Bujur Sangkar
        let luasBujurSangkar = sisi * sisi;

        // Cetak Hasil
        document.write(
            "Sisi: " + sisi + "cm " +
            "<br>Luas Bujur Sangkar: " + luasBujurSangkar + "cm² "
        );
        document.write("<br><br><hr>");
        
        document.write("<h3>Segitiga</h3>");

        // Hitung Luas Segitiga
        let alas = 10;
        let tinggi = 5;

        // Rumus Luas Segitiga
        let luasSegitiga = alas * tinggi * 0.5;

        // Cetak Hasil
        document.write(
            "Alas: " + alas + "cm " +
            "<br>Tinggi: " + tinggi + "cm " +
            "<br>Luas Segitiga: " + luasSegitiga + "cm² "
        )
    </script>
</body>
</html>
